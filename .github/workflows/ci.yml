name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**"]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "LICENSE"
      - ".github/workflows/release.yml"
      - "Cross.toml"
      - "Makefile"
  pull_request:
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "LICENSE"
      - ".github/workflows/release.yml"
      - "Cross.toml"
      - "Makefile"

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install X11 libs (Linux only)
        if: runner.os == 'Linux'
        run: sudo apt-get update -q && sudo apt-get install -y libxcb-shape0-dev libxcb-xfixes0-dev

      - name: Build workspace
        run: cargo build --workspace

      - name: Run tests
        run: cargo test --workspace

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install X11 libs
        run: sudo apt-get update -q && sudo apt-get install -y libxcb-shape0-dev libxcb-xfixes0-dev
      - run: cargo clippy --workspace --all-targets -- -D warnings

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
